<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParkPin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }
    h1 { font-size: 24px; margin-bottom: 0.25rem; }
    p.sub { color: #666; font-size: 14px; margin-bottom: 2rem; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
    }
    label {
      font-size: 13px;
      color: #666;
      display: block;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 1rem;
      background: white;
      color: #1a1a1a;
    }
    input { text-transform: uppercase; }
    button {
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #333; }
    #result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 15px;
      display: none;
    }
    .found { background: #e8f5e9; color: #2e7d32; }
    .not-found { background: #ffebee; color: #c62828; }
    .zone-big {
      font-size: 48px;
      font-weight: bold;
      text-align: center;
      margin: 0.5rem 0;
    }

    /* DIRECTIONS */
    .directions-box {
      margin-top: 1rem;
      background: white;
      border-radius: 8px;
      padding: 1rem;
      border: 1px solid #c8e6c9;
    }
    .directions-title {
      font-size: 13px;
      font-weight: bold;
      color: #2e7d32;
      margin-bottom: 0.6rem;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 0.5rem;
      font-size: 14px;
      color: #333;
      line-height: 1.5;
    }
    .step-num {
      background: #2e7d32;
      color: white;
      font-size: 11px;
      font-weight: bold;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* MAP */
    .map-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      display: none;
    }
    .map-card h2 {
      font-size: 15px;
      color: #444;
      margin-bottom: 1rem;
      text-align: center;
    }
    .zone-box {
      fill: #e0e0e0;
      stroke: #bbb;
      stroke-width: 1.5;
      cursor: default;
      transition: fill 0.3s;
    }
    .zone-box.highlight {
      fill: #ef5350;
      stroke: #c62828;
    }
    .zone-box.current {
      fill: #1565c0;
      stroke: #0d47a1;
    }
    .zone-label {
      font-size: 13px;
      font-family: sans-serif;
      fill: #444;
      text-anchor: middle;
      dominant-baseline: central;
      pointer-events: none;
    }
    .zone-label.highlight { fill: white; font-weight: bold; }
    .zone-label.current { fill: white; font-weight: bold; }
    .map-legend {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
      font-size: 12px;
      color: #666;
      flex-wrap: wrap;
    }
    .legend-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-right: 4px;
      vertical-align: middle;
    }
  </style>
</head>
<body>g

  <h1>🅿️ ParkPin</h1>
  <p class="sub">Find your vehicle instantly</p>

  <!-- SEARCH CARD -->
  <div class="card">
    <label>Vehicle number</label>
    <input type="text" id="plateInput" placeholder="e.g. TN09AB1234" />

    <label>Where are you standing now?</label>
    <select id="currentZone">
      <option value="">-- Select your current zone --</option>
      <optgroup label="Row A">
        <option value="A1">A1</option>
        <option value="A2">A2</option>
        <option value="A3">A3</option>
        <option value="A4">A4</option>
      </optgroup>
      <optgroup label="Row B">
        <option value="B1">B1</option>
        <option value="B2">B2</option>
        <option value="B3">B3</option>
        <option value="B4">B4</option>
      </optgroup>
      <optgroup label="Row C">
        <option value="C1">C1</option>
        <option value="C2">C2</option>
        <option value="C3">C3</option>
        <option value="C4">C4</option>
      </optgroup>
    </select>

    <button onclick="findVehicle()">Find My Vehicle</button>
    <div id="result"></div>
  </div>

  <!-- MAP CARD -->
  <div class="map-card" id="mapCard">
    <h2>📍 Parking map</h2>
    <svg width="100%" viewBox="0 0 420 320" xmlns="http://www.w3.org/2000/svg">

      <!-- ENTRANCE -->
      <rect x="160" y="285" width="100" height="28" rx="6" fill="#1a1a1a"/>
      <text x="210" y="299" font-size="12" fill="white" text-anchor="middle"
            dominant-baseline="central" font-family="sans-serif">⬆ ENTRANCE</text>

      <!-- ROW A -->
      <rect id="zone-A1" class="zone-box" x="20"  y="20" width="80" height="60" rx="6"/>
      <text id="label-A1" class="zone-label" x="60"  y="50">A1</text>

      <rect id="zone-A2" class="zone-box" x="120" y="20" width="80" height="60" rx="6"/>
      <text id="label-A2" class="zone-label" x="160" y="50">A2</text>

      <rect id="zone-A3" class="zone-box" x="220" y="20" width="80" height="60" rx="6"/>
      <text id="label-A3" class="zone-label" x="260" y="50">A3</text>

      <rect id="zone-A4" class="zone-box" x="320" y="20" width="80" height="60" rx="6"/>
      <text id="label-A4" class="zone-label" x="360" y="50">A4</text>

      <!-- ROW B -->
      <rect id="zone-B1" class="zone-box" x="20"  y="110" width="80" height="60" rx="6"/>
      <text id="label-B1" class="zone-label" x="60"  y="140">B1</text>

      <rect id="zone-B2" class="zone-box" x="120" y="110" width="80" height="60" rx="6"/>
      <text id="label-B2" class="zone-label" x="160" y="140">B2</text>

      <rect id="zone-B3" class="zone-box" x="220" y="110" width="80" height="60" rx="6"/>
      <text id="label-B3" class="zone-label" x="260" y="140">B3</text>

      <rect id="zone-B4" class="zone-box" x="320" y="110" width="80" height="60" rx="6"/>
      <text id="label-B4" class="zone-label" x="360" y="140">B4</text>

      <!-- ROW C -->
      <rect id="zone-C1" class="zone-box" x="20"  y="200" width="80" height="60" rx="6"/>
      <text id="label-C1" class="zone-label" x="60"  y="230">C1</text>

      <rect id="zone-C2" class="zone-box" x="120" y="200" width="80" height="60" rx="6"/>
      <text id="label-C2" class="zone-label" x="160" y="230">C2</text>

      <rect id="zone-C3" class="zone-box" x="220" y="200" width="80" height="60" rx="6"/>
      <text id="label-C3" class="zone-label" x="260" y="230">C3</text>

      <rect id="zone-C4" class="zone-box" x="320" y="200" width="80" height="60" rx="6"/>
      <text id="label-C4" class="zone-label" x="360" y="230">C4</text>

    </svg>

    <div class="map-legend">
      <span><span class="legend-dot" style="background:#e0e0e0;border:1px solid #bbb"></span>Empty zone</span>
      <span><span class="legend-dot" style="background:#1565c0"></span>You are here</span>
      <span><span class="legend-dot" style="background:#ef5350"></span>Your vehicle</span>
    </div>
  </div>

  <script>
    async function findVehicle() {
      const plate = document.getElementById("plateInput").value.trim();
      const currentZone = document.getElementById("currentZone").value;
      if (!plate) return;

      const response = await fetch("/find", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ plate: plate, current_zone: currentZone })
      });

      const data = await response.json();
      const resultDiv = document.getElementById("result");
      const mapCard = document.getElementById("mapCard");

      resultDiv.style.display = "block";
      clearHighlights();

      if (data.found) {
        // Build directions HTML
        let directionsHTML = "";
        if (data.directions && data.directions.length > 0 && data.from_zone) {
          const stepsHTML = data.directions.map((step, i) => `
            <div class="step">
              <div class="step-num">${i + 1}</div>
              <span>${step}</span>
            </div>
          `).join("");
          directionsHTML = `
            <div class="directions-box">
              <div class="directions-title">🧭 Directions from ${data.from_zone} to ${data.zone}</div>
              ${stepsHTML}
            </div>
          `;
        }

        resultDiv.className = "found";
        resultDiv.innerHTML = `
          <p>Vehicle found! Your zone is</p>
          <div class="zone-big">${data.zone}</div>
          <p style="text-align:center;color:#555;font-size:13px">
            Walk to zone ${data.zone} to find your vehicle
          </p>
          ${directionsHTML}
        `;

        mapCard.style.display = "block";
        highlightZone(data.zone, "highlight");
        if (data.from_zone) highlightZone(data.from_zone, "current");

      } else {
        resultDiv.className = "not-found";
        resultDiv.innerHTML = `
          <p>❌ Vehicle <strong>${data.plate}</strong> not found. Did you park with us?</p>
        `;
        mapCard.style.display = "none";
      }
    }

    function highlightZone(zone, type) {
      const box = document.getElementById("zone-" + zone);
      const label = document.getElementById("label-" + zone);
      if (box) box.classList.add(type);
      if (label) label.classList.add(type);
    }

    function clearHighlights() {
      document.querySelectorAll(".zone-box").forEach(el => {
        el.classList.remove("highlight", "current");
      });
      document.querySelectorAll(".zone-label").forEach(el => {
        el.classList.remove("highlight", "current");
      });
    }

    document.getElementById("plateInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") findVehicle();
    });
  </script>

</body>
</html>
